<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Análise de dados de idade</title>
  </head>
  <body>
    <h1>Análise de dados de idade</h1>
    <h2>Objetivo:</h2>
    <p>Em um array com nome e idade de pessoas descubra:</p>
    <ul>
      <li>soma total das idades</li>
      <li>idade média</li>
      <li>maior idade</li>
      <li>menor idade</li>
    </ul>

    <h2>Resolução:</h2>
    <label for="nome">Nome: </label>
    <input type="text" name="nome" id="nome">
    <label for="idade">Idade: </label>
    <input type="number" name="idade" id="idade" min="0" max="150">
    <button class="add btn">Adicionar</button>
    <div id="array-container"></div>

    <button class="calc btn">Calcular</button>
    <div id="respostas-container"></div>

    <script src="script-ts.js"></script>
  </body>
</html>
