<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho de compras</title>
  </head>
  <body>
    <h1>Carrinho de compras</h1>
    <h2>Objetivo:</h2>
    <ul>
      <li>Pegar apenas produtos com quantidade > 1</li>
      <li>Calcular o subtotal de cada produto (preco * quantidade)</li>
      <li>Calcular o valor total do carrinho</li>
    </ul>

    <h2>Resolução:</h2>
    <label for="produto">Produto: </label>
    <input type="text" name="produto" id="produto">
    <label for="preco">Preço: </label>
    <input type="number" name="preco" id="preco">
    <label for="quantidade">Quantidade: </label>
    <input type="number" name="quantidade" id="quantidade">
    <button class="btn add">Adicionar</button>

    <div id="array-container"></div>

    <button class="btn calc">Calcular</button>

    <div id="respostas-container"></div>
    
    <script src="script-ts.js"></script>
  </body>
</html>
