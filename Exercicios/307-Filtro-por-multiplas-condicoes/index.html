<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filtro por múltiplas condições</title>
  </head>
  <body>
    <h1>Filtro por múltiplas condições</h1>
    <h2>Objetivos:</h2>
    <p>Filtrar apenas pessoas que:</p>
    <ul>
      <li>sejam maiores de idade</li>
      <li>e morem em SP</li>
    </ul>

    <h2>Resolução:</h2>
    <label for="nome">Nome:</label>
    <input type="text" name="nome" id="nome">
    <label for="idade">Idade:</label>
    <input type="number" name="idade" id="idade" min="0">
    <label for="cidade">Cidade:</label>
    <input type="text" name="cidade" id="cidade">
    <button class="add btn">Adicionar</button>
    <div id="array-container"></div>

    <button class="calc btn">Calcular</button>
    <div id="respostas-container"></div>

    <script src="script-ts.js"></script>
  </body>
</html>
