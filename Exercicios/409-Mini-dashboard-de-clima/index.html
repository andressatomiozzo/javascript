<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini dashboard de clima</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Mini dashboard de clima</h1>
    <p id="instrucao">Digite a cidade ou a latitude e longitude da região que queira ver mais detalhes sobre o clima.</p>
    <form action="">
      <div>
        <label for="cidade">Cidade: </label>
        <input type="text" name="cidade" id="cidade" />
      </div>
      <div>
        <label for="lat">Latitude: </label>
        <input type="text" name="lat" id="lat" />
      </div>
      <div>
        <label for="lon">Longitude: </label>
        <input type="text" name="lon" id="lon" />
      </div>
      <button class="detablhes btn">Ver clima</button>
    </form>
    <p id="alerta"></p>
    <div id="resposta-container">
      <p id="cidade-resposta"></p>
      <p id="lat-resposta"></p>
      <p id="lon-resposta"></p>
      <p id="tempo"></p>
      <p id="temperatura"></p>
      <p id="sensacao-termica"></p>
      <p id="temp-min"></p>
      <p id="temp-max"></p>
      <p id="umidade"></p>
    </div>

    <script src="main-ts.js"></script>
  </body>
</html>
