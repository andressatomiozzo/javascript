<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de países</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Consulta de países</h1>
    <p id="instrucao">Digite o nome do país (em inglês) que deseja ver mais detalhes e clique em "Ver detalhes".</p>
    <form action="">
      <div>
        <label for="nome">Nome do país:</label>
        <input type="text" name="nome" id="nome">
      </div>
      <button class="detalhes btn">Ver detalhes</button>
    </form>
    <p id="alerta"></p>
    <div id="resposta-container">
      <img id="resposta-bandeira" src="#" alt="">
      <a id="resposta-maps" href="#"></a>
      <div>
        <p id="resposta-nomeOficial"></p>
        <p id="resposta-nomeNativo"></p>
        <p id="resposta-capital"></p>
        <p id="resposta-continente"></p>
        <p id="resposta-lingua"></p>
      </div>
    </div>

    <script src="main-ts.js"></script>
  </body>
</html>
