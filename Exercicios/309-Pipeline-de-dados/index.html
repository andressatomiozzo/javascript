<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipeline de dados</title>
  </head>
  <body>
    <h1>Pipeline de dado</h1>
    <h2>Objetivo:</h2>
    <p>EM um array de números: (faça tudo em sequência)</p>
    <ul>
      <li>Filtrar apenas números pares</li>
      <li>Dobrar cada número</li>
      <li>Somar todos os valores finais</li>
    </ul>

    <h2>Resolução:</h2>
    <label for="numeros">Adicione um número:</label>
    <input type="number" name="numeros" id="numeros">
    <button class="add btn">Adicionar</button>
    <button class="calc btn">Calcular</button>
    <button class="reset btn">Resetar</button>

    <p id="array-content"></p>

    <p id="resposta-content"></p>
    <script src="script-ts.js"></script>
  </body>
</html>
