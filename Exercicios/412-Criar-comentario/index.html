<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar comentário</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Criar comentário</h1>
    <p id="instrucao">Digite seu nome, sua mensagem e clique em "Enviar".</p>
    <form action="">
      <div>
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome" required/>
      </div>
      <div id="mensagem-container">
        <label for="mensagem">Mensagem:</label>
        <textarea name="mensagem" id="mensagem"></textarea>
      </div>
      <button class="enviar btn">Enviar comentário</button>
    </form>
    <p id="alerta"></p>

    <script src="main-ts.js"></script>
  </body>
</html>
