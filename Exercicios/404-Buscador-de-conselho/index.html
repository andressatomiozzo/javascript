<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de conselho</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Buscador de conselho</h1>
    <p id="instrucao">Clique no botão "Mostrar conselho" para o conselho que você precisa agora, ou então adicione o número do conselho que você deseja rever.</p>
    <form action="">
      <div>
        <label for="numero">Número:</label>
        <input type="text" name="numero" id="numero">
      </div>
      <button class="gerar btn">Mostrar conselho</button>
    </form>
    <div id="resposta-container">
      <p id="resposta-id"></p>
      <p id="resposta-mensagem"></p>
    </div>
  </body>
</html>
